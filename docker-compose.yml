##############################################################################
# Digilib UNISMU — Full Stack Docker Compose
# Menjalankan: MySQL 8 + Backend API (Node.js) + Frontend (Nginx)
#
# Cara pakai:
#   1. cp .env.example .env  →  isi JWT_SECRET & JWT_REFRESH_SECRET
#   2. docker compose up -d --build
#   3. Buka http://localhost:3000
##############################################################################

services:

  # ── Database MySQL 8 ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: digilib_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_digilib_2024}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-digilib_unismu}
      MYSQL_USER:          ${MYSQL_USER:-digilib_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-digilib_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_allowed_packet=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_digilib_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API (Node.js + Prisma) ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digilib_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      DATABASE_URL:           mysql://${MYSQL_USER:-digilib_user}:${MYSQL_PASSWORD:-digilib_password}@db:3306/${MYSQL_DATABASE:-digilib_unismu}
      PORT:                   5000
      JWT_SECRET:             ${JWT_SECRET:?JWT_SECRET wajib diisi di .env}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET wajib diisi di .env}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost:3000}
      UPLOAD_PATH:            ./uploads
      MAX_FILE_SIZE_MB:       ${MAX_FILE_SIZE_MB:-50}
      LOG_LEVEL:              ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    command: >
      sh -c "
        echo '⏳ Menjalankan migrasi database...' &&
        npx prisma migrate deploy &&
        echo '✅ Migrasi OK' &&
        node prisma/seed.js &&
        echo '✅ Seed OK' &&
        node src/index.js
      "
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend (React + Vite → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: digilib_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
