# nginx/conf.d/digilib.https.conf
# ─────────────────────────────────────────────────────────────────────────────
# Digilib UNISMU — Nginx Reverse Proxy (HTTPS)
#
# Gunakan file ini SETELAH sertifikat SSL berhasil diperoleh dari Certbot.
#
# Cara aktifkan:
#   cp nginx/conf.d/digilib.https.conf nginx/conf.d/digilib.conf
#   Ganti DOMAIN_ANDA di bawah dengan domain asli (misal: digilib.unismu.ac.id)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml restart nginx
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

upstream digilib_api      { server api:5000;      keepalive 32; }
upstream digilib_frontend { server frontend:80;   keepalive 16; }

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name DOMAIN_ANDA;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name DOMAIN_ANDA;

    # SSL — sertifikat dari Certbot
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_ANDA/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_ANDA/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass         http://digilib_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass         http://digilib_api;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        client_max_body_size 1m;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://digilib_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
