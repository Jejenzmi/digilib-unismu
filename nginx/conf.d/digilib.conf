# nginx/conf.d/digilib.conf
# ─────────────────────────────────────────────────────────────────────────────
# Digilib UNISMU — Nginx Reverse Proxy
#
# TAHAP 1 (HTTP only) — jalankan ini dulu untuk mendapatkan sertifikat SSL
# Setelah sertifikat berhasil, ganti ke digilib.https.conf
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Upstream
upstream digilib_api {
    server api:5000;
    keepalive 32;
}

upstream digilib_frontend {
    server frontend:80;
    keepalive 16;
}

# ── HTTP → HTTPS redirect (aktifkan setelah SSL siap) ────────────────────────
# Untuk sementara, HTTP biasa melayani frontend dan API
server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (biarkan tetap ada)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass          http://digilib_api;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Upload file besar
        client_max_body_size 55m;
    }

    # ── API Login (rate limit ketat) ─────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://digilib_api;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 1m;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://digilib_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
